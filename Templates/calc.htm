<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mortgage</title>
    <link rel="stylesheet" href="https://ajax.aspnetcdn.com/ajax/jquery.mobile/1.1.1/jquery.mobile-1.1.1.min.css" />
    <link href="../CSS/my.css" rel="stylesheet" type="text/css" />
    <style type="text/css">
        .ui-field-contain label.ui-input-text
        {
            width: 100% !important;
        }
        .ui-field-contain label.ui-select
        {
            width: 100% !important;
        }
        .ui-field-contain .ui-controlgroup-controls
        {
            width: 100% !important;
        }
        .ui-field-contain .ui-select
        {
            width: 100% !important;
        }
        .ui-field-contain div.ui-slider
        {
            width: 60% !important;
        }
        .roundcorner
        {
            border-bottom-left-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
            border-top-left-radius: 8px !important;
            border-top-right-radius: 8px !important;
            background: white !important;
            margin: 5% !important;
        }
    </style>

    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js">
    </script>

    <script type="text/javascript" src="https://ajax.aspnetcdn.com/ajax/jquery.mobile/1.1.1/jquery.mobile-1.1.1.min.js">
    </script>

    <script src="../Scripts/jQueryMobile/my.js" type="text/javascript"></script>

    <link href="../CSS/apple.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div data-role="page" id="page1">
        <div id="jqt" class="portrait">
            <div id="forms" class="current">
                <div data-role="content" class="roundcorner" style="padding: 15px">
                    <div data-role="fieldcontain">
                        <fieldset data-role="controlgroup" data-mini="true">
                            <label for="textinput1">
                                Cost of the property :
                            </label>
                            <input name="PurchasePrice" id="textinput1" placeholder="" value="" type="number"
                                onchange="Calculate();" onkeyup="Calculate();" />
                        </fieldset>
                    </div>
                    <div data-role="fieldcontain">
                        <fieldset data-role="controlgroup" data-mini="true">
                            <label for="textinput2">
                                Down payment :
                            </label>
                            <input name="DownPayment" id="textinput2" placeholder="" value="" type="number" onchange="Calculate();" />
                        </fieldset>
                    </div>
                    <div data-role="fieldcontain">
                        <fieldset data-role="controlgroup" data-mini="true">
                            <label for="textinput3">
                                Amortization period (years) :</label>
                            <input class="slider" name="slider" id="textinput3" value="5" min="0" max="100" data-highlight="true"
                                data-track-theme="b" type="range" onchange="Calculate();" onkeyup="Calculate();" />
                        </fieldset>
                    </div>
                    <div data-role="fieldcontain">
                        <label for="selectmenu2">
                            Payment frequency :
                        </label>
                        <select data-native-menu="false" name="selectmenu2" id="selectmenu2" data-theme="b"
                            data-mini="true" onchange="Calculate();" onkeyup="Calculate();">
                            <option value="12">Monthly </option>
                            <option value="52">Weekly </option>
                        </select>
                    </div>
                    <div data-role="fieldcontain">
                        <fieldset data-role="controlgroup" data-mini="true">
                            <label for="selectmenu1">
                                Interest rate :
                            </label>
                            <input name="InterestRate" id="selectmenu1" placeholder="" value="1" type="number"
                                onchange="Calculate();" onkeyup="Calculate();" />
                        </fieldset>
                    </div>
                    <div data-role="fieldcontain">
                        <fieldset data-role="controlgroup" data-mini="true">
                            <label for="textinput4">
                                MORTGAGE PAYMENT :
                            </label>
                            <input name="Payment" id="textinput4" placeholder="" value="" type="text" onchange="Calculate();"
                                onkeyup="Calculate();" />
                        </fieldset>
                    </div>
                    <a data-role="button" data-inline="true" data-transition="fade" data-theme="b" onclick="Calculate();"
                        data-icon="check" data-iconpos="right">Calculate </a>
                </div>
            </div>
        </div>
    </div>
</body>

<script type="text/javascript" language="javascript">
    if (window.attachEvent) {
        window.attachEvent('onload', Calculate);
    } else {
        if (window.onload) {
            var curronload = window.onload;
            var newonload = function() {
                curronload();
                Calculate();
            };
            window.onload = newonload;
        } else {
            window.onload = Calculate;
        }
    }

    // Select the best rate
    function SelectBestRate() {
        var Rate = document.getElementById('selectmenu1'); // Percent, ie: 10
        Rate.value = 0.00
    }

    // Get the down payment (3% min)
    function GetDownPayment() {
        // Get the values
        var DownPayment = document.getElementById('textinput2').value;
        var PurchasePrice = document.getElementById('textinput1').value;

        // Format the purchase price
        // Remove everything after the first period
        PurchasePrice = PurchasePrice.split(".", 1)[0];
        // Now remove all non-numerics
        PurchasePrice = PurchasePrice.replace(/[^0-9]/g, "");
        if (PurchasePrice.length < 1)
            PurchasePrice = 0;
        else
            PurchasePrice = parseFloat(PurchasePrice);

        // Format the downpayment
        if (DownPayment.indexOf('%') < 0) {
            // Dollar Amount
            // Format
            DownPayment = DownPayment.split(".", 1)[0];
            // Now remove all non-numerics
            DownPayment = DownPayment.replace(/[^0-9]/g, "");
            if (DownPayment.length < 1)
                DownPayment = 0;
            else
                DownPayment = parseFloat(DownPayment);
        } else {
            // Percent
            // Format
            DownPayment = DownPayment.split(".", 1)[0];
            // Now remove all non-numerics
            DownPayment = DownPayment.replace(/[^0-9]/g, "");
            if (DownPayment.length < 1)
                DownPayment = 0;
            else
                DownPayment = parseFloat(DownPayment);
            // Calc percent
            DownPayment = DownPayment / 100 * PurchasePrice;
        }

        // Now make sure we have 3% min
        if (PurchasePrice * 0.03 > DownPayment) {
            DownPayment = PurchasePrice * 0.03;
        }

        // Update the field
        document.getElementById('textinput2').value = DownPayment;

        // Return the value so that it can be used elsewhere
        return DownPayment;
    }

    // Do the calculation
    function Calculate() {
        // Get the values
        var PurchasePrice = document.getElementById('textinput1').value;
        var DownPayment = GetDownPayment();
        var Rate = document.getElementById('selectmenu1').value; // Percent, ie: 10
        var Amortization = document.getElementById('textinput3').value; // Years
        var PaymentFreq = document.getElementById('selectmenu2').value;

        // Do we have a valid rate?
        if (Rate == "" || Rate < 1) {
            //SelectBestRate();
            //Rate = document.getElementById('InterestRate').value; // Percent, ie: 10
            Rate = 0.00
        }

        // Format the purchase price
        // Remove everything after the first period
        PurchasePrice = PurchasePrice.split(".", 1)[0];
        // Now remove all non-numerics
        PurchasePrice = PurchasePrice.replace(/[^0-9]/g, "");
        if (PurchasePrice.length < 1)
            PurchasePrice = 0;
        else
            PurchasePrice = parseFloat(PurchasePrice);

        // Perform the calculation
        var Principal = PurchasePrice - DownPayment;
        var Top = Math.pow(1 + Rate / 200, 1 / (PaymentFreq / 2)) - 1;
        var Bottom1 = Math.pow(1 + Rate / 200, 1 / (PaymentFreq / 2));
        var Bottom2 = Math.pow(Bottom1, -(PaymentFreq) * Amortization);

        var Payment = Principal * Top / (1 - Bottom2);

        // Strip off the cents
        var PaymentNoCents = Math.round(Payment);

        if (PaymentFreq == 12) {
            document.getElementById('textinput4').value = '$' + PaymentNoCents + ' per month';
        } else {
            document.getElementById('textinput4').value = '$' + PaymentNoCents + ' per week';
        }
    }
</script>

</html>
